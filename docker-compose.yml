services:
  db:
    image: postgis/postgis:16-3.4
    container_name: fuelsense_db
    environment:
      POSTGRES_DB: fuelsense
      POSTGRES_USER: fuelsense
      POSTGRES_PASSWORD: fuelsense_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuelsense -d fuelsense"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fuelsense_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
